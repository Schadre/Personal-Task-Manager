name: CI/CD

on:
  push:
    branches:
      - dev
      - main

  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BE_task_manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set test environment variables
        run: |
          echo "GOOGLE_CLIENT_ID=fake_test_id" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=fake_test_secret" >> $GITHUB_ENV
          echo "SECRET_KEY=fake_secret_key" >> $GITHUB_ENV

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FE_task_manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment target
        id: target
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=development" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          ENVIRONMENT: ${{ steps.target.outputs.env }}

        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts

          chmod 600 ~/.ssh/id_deploy ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_deploy \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "set -e;
             cd /srv/task-manager/$ENVIRONMENT;

             echo 'Deploying $ENVIRONMENT (branch: ${{ github.ref_name }})';

             git fetch origin;
             git checkout ${{ github.ref_name }};
             git pull origin ${{ github.ref_name }};

             if [ ! -d .venv ]; then
               python3 -m venv .venv;
             fi;

             source .venv/bin/activate;

             pip install --upgrade pip;
             pip install -r BE_task_manager/requirements.txt;

             cd BE_task_manager;

             flask db stamp head || true;
             flask db upgrade head;

             cd ../FE_task_manager;

             if [ ! -f \"\$HOME/.nvm/nvm.sh\" ]; then
               curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash;
             fi;

             export NVM_DIR=\"\$HOME/.nvm\";

             [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\";

             nvm install --lts;
             nvm use --lts;

             npm ci;
             npm run build;

             cd ..;

             sudo systemctl restart task-manager-$ENVIRONMENT;

             echo 'Deployment completed successfully.'"