- name: Deploy via SSH
  env:
    SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
    SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
    SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
    SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
    ENVIRONMENT: ${{ steps.target.outputs.env }}
  run: |
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    printf '%s\n' "$SSH_KEY"     > ~/.ssh/id_deploy
    printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
    chmod 600 ~/.ssh/id_deploy ~/.ssh/known_hosts

    ssh -i ~/.ssh/id_deploy \
        -o UserKnownHostsFile=~/.ssh/known_hosts \
        -p "$SSH_PORT" \
        "$SSH_USER@$SSH_HOST" \
        "set -e; \
         cd /srv/task-manager/$ENVIRONMENT; \
         echo 'Deploying $ENVIRONMENT (branch: ${{ github.ref_name }})'; \
         git fetch origin; \
         git checkout ${{ github.ref_name }}; \
         git pull origin ${{ github.ref_name }}; \
         if [ ! -d .venv ]; then python3 -m venv .venv; fi; \
         source .venv/bin/activate; \
         pip install --upgrade pip; \
         pip install -r BE_task_manager/requirements.txt; \
         cd BE_task_manager; \
         flask db stamp head || true; \
         flask db upgrade head; \
         cd ..; \
         cd FE_task_manager; \
         if [ ! -f \"\$HOME/.nvm/nvm.sh\" ]; then curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash; fi; \
         export NVM_DIR=\"\$HOME/.nvm\"; \
         [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"; \
         nvm install 20.19.0; \
         nvm use 20.19.0; \
         npm install; \
         npm run build; \
         cd ..; \
         sudo systemctl restart task-manager-$ENVIRONMENT"