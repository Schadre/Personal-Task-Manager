name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to deploy"
        required: true
        type: choice
        options: [dev, prod]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.environment }}" = "prod" ]; then
              echo "branch=main" >> "$GITHUB_OUTPUT"
            else
              echo "branch=dev" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
            echo "branch=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          ENVIRONMENT: ${{ steps.target.outputs.env }}
          BRANCH: ${{ steps.target.outputs.branch }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_deploy ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_deploy \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -p "$SSH_PORT" \
              "$SSH_USER@$SSH_HOST" \
              "set -e; \
               cd /srv/task-manager/$ENVIRONMENT; \
               git fetch origin $BRANCH; \
               git reset --hard origin/$BRANCH; \
               VITE_GOOGLE_CLIENT_ID='$VITE_GOOGLE_CLIENT_ID' \
                 bash scripts/deploy.sh $ENVIRONMENT"
