name: Tests

on:
  pull_request:
    branches: [dev, main]

  push:
    branches: [dev, main]

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BE_task_manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set test environment variables
        run: |
          echo "GOOGLE_CLIENT_ID=fake_test_id" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=fake_test_secret" >> $GITHUB_ENV
          echo "SECRET_KEY=fake_secret_key" >> $GITHUB_ENV

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FE_task_manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test